
<style>
:root {
  /* Fundo escuro */
  --color-background-primary: #1e1e1e;
  --color-background-secondary: #2a2a2a;
  --color-background-tertiary: #121212;

  /* Textos claros */
  --color-text-primary: #f0f0f0;
  --color-text-secondary: #b3b3b3;
  --color-text-tertiary: #888888;

  /* Bordas sutis */
  --color-border-primary: #555555;
  --color-border-secondary: #404040;
  --color-border-tertiary: #2e2e2e;

  /* Cores de estado (ajustadas para leitura em fundo escuro) */
  --color-background-info: #1a365d;
  --color-text-info: #63b3ed;
  --color-background-success: #1c4532;
  --color-text-success: #68d391;
  --color-background-warning: #744210;
  --color-text-warning: #fbd38d;
  --color-background-danger: #742a2a;
  --color-text-danger: #fc8181;

  /* Constantes de layout */
  --border-radius-md: 6px;
  --border-radius-lg: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'system-ui');background:var(--color-background-tertiary);color:var(--color-text-primary);font-size:14px}
#root{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 14px 10px;position:sticky;top:0;z-index:20}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-left {min-width: 0; flex: 1;}
.hdr-left h1{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-left p{font-size:11px;color:var(--color-text-tertiary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);padding:5px 8px;font-size:18px;display:flex;align-items:center;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.icon-btn:hover{background:var(--color-background-secondary)}
.icon-btn.primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.search-wrap{position:relative;margin-top:10px}
.search-wrap input{width:100%;padding:8px 34px 8px 34px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--color-border-primary)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--color-text-tertiary);font-size:16px}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--color-text-tertiary);font-size:14px;background:none;border:none;cursor:pointer}
.content{flex:1;padding:12px 14px 70px}
.nav{display:flex;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);position:sticky;bottom:0;z-index:10}
.nav-btn{flex:1;padding:9px 4px 11px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--color-text-tertiary);font-size:10px}
.nav-btn.on{color:var(--color-text-info)}
.nav-btn i{font-size:20px}
/* Patient list */
.pac-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 14px;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.pac-card:hover{border-color:var(--color-border-primary)}
.pac-avatar{width:40px;height:40px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:var(--color-text-info);flex-shrink:0}
.pac-nome{font-size:14px;font-weight:500;margin-bottom:2px}
.pac-info{font-size:12px;color:var(--color-text-secondary)}
.pac-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 7px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.tag.gest{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.tag.exames{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
/* Form */
.form-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
.form-section h2{font-size:12px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:9px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--color-border-primary)}
.field textarea{resize:none;min-height:72px;line-height:1.5}
.field-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:4px}
.sex-wrap{display:flex;gap:6px}
.sex-btn{flex:1;padding:8px;font-size:13px;border-radius:var(--border-radius-md);border:1.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-tertiary);cursor:pointer;font-weight:400;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.sex-btn.on{border-color:var(--color-text-info);background:var(--color-background-info);color:var(--color-text-info);font-weight:500}
.sex-btn.on::before{content:'✓';font-size:12px}
.save-btn{width:100%;padding:13px;border:none;border-radius:var(--border-radius-lg);background:var(--color-background-info);color:var(--color-text-info);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}
.del-btn{width:100%;padding:11px;border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-lg);background:transparent;color:var(--color-text-danger);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
/* Exam cards (same as v3) */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.bx{background:var(--color-background-danger);color:var(--color-text-danger)}
.ba{background:var(--color-background-warning);color:var(--color-text-warning)}
.bok{background:var(--color-background-success);color:var(--color-text-success)}
.bm{background:var(--color-background-info);color:var(--color-text-info)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cat-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 12px;cursor:pointer;transition:border-color .15s}
.cat-card:hover{border-color:var(--color-border-primary)}
.cat-icon{font-size:20px;width:36px;height:36px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.cat-name{font-size:12px;font-weight:500;line-height:1.3}
.cat-cnt{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.eli{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:11px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s}
.eli:hover{border-color:var(--color-border-primary)}
.eli-name{font-size:13px;font-weight:500}
.eli-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.det-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px;margin-bottom:9px}
.det-lbl{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.det-val{font-size:13px;line-height:1.55}
.ref-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 11px;font-size:13px;color:var(--color-text-secondary);line-height:1.5;font-family:var(--font-mono)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{font-size:11px;padding:3px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;color:var(--color-text-secondary)}
.cond-box{border-radius:var(--border-radius-md);padding:11px 13px;font-size:13px;line-height:1.55}
.cond-box.x{background:var(--color-background-danger);color:var(--color-text-danger)}
.cond-box.a{background:var(--color-background-warning);color:var(--color-text-warning)}
.cond-box.ok{background:var(--color-background-success);color:var(--color-text-success)}
.cond-box.m{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.add-to-eval-btn{width:100%;padding:12px;border:none;border-radius:var(--border-radius-lg);background:var(--color-background-info);color:var(--color-text-info);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:2px}
.add-to-eval-btn.added{background:var(--color-background-success);color:var(--color-text-success);cursor:default}
.ex-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:9px;overflow:hidden}
.ex-card-hd{padding:10px 12px 6px;display:flex;align-items:flex-start;justify-content:space-between}
.ex-name{font-size:13px;font-weight:500}
.ex-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:15px;padding:2px;border-radius:4px;flex-shrink:0}
.rm-btn:hover{color:var(--color-text-danger)}
.ex-inp-row{padding:0 12px 8px;display:flex;align-items:center;gap:8px}
.ex-inp-row input{flex:1;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:15px;font-weight:500;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;font-family:var(--font-mono,'monospace')}
.ex-inp-row input:focus{border-color:var(--color-border-primary)}
.ex-unit{font-size:12px;color:var(--color-text-tertiary);min-width:36px}
.ex-ref{padding:0 12px 8px;font-size:11px;color:var(--color-text-tertiary)}
.cstrip{padding:9px 12px;border-top:0.5px solid var(--color-border-tertiary)}
.cstrip.x{background:var(--color-background-danger)}.cstrip.a{background:var(--color-background-warning)}.cstrip.ok{background:var(--color-background-success)}
.cstrip .cst{font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;margin-bottom:3px}
.cstrip.x .cst,.cstrip.x .ccd{color:var(--color-text-danger)}
.cstrip.a .cst,.cstrip.a .ccd{color:var(--color-text-warning)}
.cstrip.ok .cst,.cstrip.ok .ccd{color:var(--color-text-success)}
.ccd{font-size:12px;line-height:1.5}
.tip{padding:5px 12px 9px;font-size:11px;color:var(--color-text-tertiary);line-height:1.5}
.acc-cat{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:7px;overflow:hidden}
.acc-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acc-hdr:hover{background:var(--color-background-secondary)}
.acc-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.acc-cnt{font-size:11px;color:var(--color-text-tertiary);font-weight:400}
.acc-chev{font-size:15px;color:var(--color-text-tertiary);transition:transform .2s}
.acc-chev.open{transform:rotate(180deg)}
.acc-body{border-top:0.5px solid var(--color-border-tertiary)}
.aer{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--color-border-tertiary)}
.aer:last-child{border-bottom:none}
.aer-name{font-size:13px}.aer-unit{font-size:11px;color:var(--color-text-tertiary)}
.add-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--color-border-primary);
  background: var(--color-background-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-text-info);
  font-size: 18px;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.add-btn:hover {
  background: var(--color-background-info);
  border-color: var(--color-text-info);
  color: #fff;
}
.add-btn.chk {
  background: var(--color-background-success);
  border-color: transparent;
  color: var(--color-text-success);
  cursor: default;
}
.sum-hero{border-radius:var(--border-radius-lg);padding:16px;margin-bottom:12px;text-align:center}
.sum-hero.ok{background:var(--color-background-success)}.sum-hero.a{background:var(--color-background-warning)}.sum-hero.x{background:var(--color-background-danger)}
.sh-lbl{font-size:11px;font-weight:500;margin-bottom:4px}.sh-val{font-size:20px;font-weight:500}
.sum-hero.ok .sh-lbl,.sum-hero.ok .sh-val{color:var(--color-text-success)}
.sum-hero.a .sh-lbl,.sum-hero.a .sh-val{color:var(--color-text-warning)}
.sum-hero.x .sh-lbl,.sum-hero.x .sh-val{color:var(--color-text-danger)}
.sum-row{display:flex;gap:9px;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px;align-items:flex-start}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sdot.x{background:var(--color-text-danger)}.sdot.a{background:var(--color-text-warning)}.sdot.ok{background:var(--color-text-success)}
.sr-nm{font-size:13px;font-weight:500;margin-bottom:2px}.sr-vl{font-size:11px;color:var(--color-text-tertiary)}
.sr-cd{font-size:12px;margin-top:3px}
.sr-cd.x{color:var(--color-text-danger)}.sr-cd.a{color:var(--color-text-warning)}.sr-cd.ok{color:var(--color-text-success)}
.disc{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:12px;line-height:1.5}
.empty{text-align:center;padding:44px 16px;color:var(--color-text-tertiary)}
.empty i{font-size:30px;display:block;margin-bottom:8px}
.empty p{font-size:13px;margin-top:4px}
.sec-hdr{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.pac-info-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.pac-info-bar strong{color:var(--color-text-primary);font-weight:500}
</style>
<div style="background:var(--color-background-primary);padding:14px 20px 10px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary)">
  <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-info);margin-bottom:5px">🏥 Residência EF · SUS</div>
  <div style="font-size:15px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.2px">Sistema de apoio à conduta</div>
  <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:2px">com exames laboratoriais</div>
</div>
<div id="root"><div style="text-align:center;padding:60px 20px;color:var(--color-text-tertiary)"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px"></i>Carregando...</div></div>

  {id:'vitd',name:'Vitamina D (25-OH)',abbr:'Vit D',cat:'vitaminas',sub:'Vitaminas',unit:'ng/mL',step:'0.5',sexDep:false,desc:'Marcador do estoque corporal de vitamina D.',altClin:'↑ suplementação excessiva | ↓ deficiência, baixa exposição solar',related:['Cálcio','fósforo','PTH'],exRel:'Níveis adequados favorecem função muscular.',condText:'Déficit importante pede correção; não contraindica isoladamente.',ct:'ok',refDisplay:_=>'20–60 ng/mL',ev:(v)=>{if(v<10)return{c:'a',st:'Deficiência grave',cd:'Com restrição — função muscular comprometida.',tip:''};if(v<20)return{c:'a',st:'Deficiência',cd:'Indicado com cautela — repor.',tip:''};if(v<=60)return{c:'ok',st:'Normal',cd:'Indicado.',tip:''};return{c:'a',st:'Possivelmente elevada',cd:'Investigar suplementação excessiva.',tip:''}}}
];

const CATS_WITH_EX=CATS_META.map(c=>({...c,exams:EX.filter(e=>e.cat===c.id)})).filter(c=>c.exams.length>0);

let st={
  screen:'patients',
  patients:[],
  currentPac:null,
  form:null,
  tab:'ref',
  refSc:'cats',refCat:null,refExam:null,
  accOpen:null,q:'',
  evalMode:'select'
};

function uid(){return'p_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadPacs(){
  try{const r=await window.storage.get(STORAGE_KEY);if(r)st.patients=JSON.parse(r.value);}catch(e){st.patients=[];}
  render();
}
async function savePacs(){try{await window.storage.set(STORAGE_KEY,JSON.stringify(st.patients));}catch(e){}}

function calcAge(dob){
  if(!dob)return null;
  try{const d=new Date(dob+'T00:00:00'),t=new Date();let a=t.getFullYear()-d.getFullYear();const m=t.getMonth()-d.getMonth();if(m<0||(m===0&&t.getDate()<d.getDate()))a--;return a<0?null:a;}catch(e){return null;}
}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
function initials(nome){return nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')||'?';}

function evExam(exam,val,sex){
  if(exam.binary){return exam.ev(val==='1'?1:0,sex);}
  const v=parseFloat(String(val).replace(',','.'));
  if(isNaN(v))return null;
  return exam.ev(v,sex);
}
function refStr(exam,sex){return typeof exam.refDisplay==='function'?exam.refDisplay(sex):exam.refDisplay;}
function overallCt(entries,sex){
  const rs=Object.keys(entries).map(id=>{const ex=EX.find(e=>e.id===id);return ex?evExam(ex,entries[id],sex):null;}).filter(Boolean);
  if(rs.some(r=>r.c==='x'))return'x';if(rs.some(r=>r.c==='a'))return'a';if(rs.length>0)return'ok';return null;
}

function render(){document.getElementById('root').innerHTML=buildApp();}

function buildApp(){
  if(st.screen==='patients') return buildPatientList();
  if(st.screen==='form') return buildForm();
  if(st.screen==='patientView') return buildPatientView();
  return '';
}

function buildPatientList(){
  const pacs=st.patients;
// Volte para isso aqui:
  return`<div class="hdr">
    <div class="hdr-row">
      <div class="hdr-left"><h1>Pacientes</h1></div>
      <button class="icon-btn primary" onclick="openForm(null)"><i class="ti ti-plus" aria-hidden="true"></i> Nova</button>
    </div>
  </div>
  <div class="content" style="padding-bottom:20px">
    ${!pacs.length?`<div class="empty"><i class="ti ti-users" aria-hidden="true"></i><p>Nenhuma paciente cadastrada.</p><p style="margin-top:8px"><button class="icon-btn primary" onclick="openForm(null)" style="margin:0 auto"><i class="ti ti-plus" aria-hidden="true"></i> Cadastrar primeira paciente</button></p></div>`
    :pacs.map(p=>{
      const age=calcAge(p.dataNasc);
      const numEx=Object.keys(p.entries||{}).length;
      const ct=numEx?overallCt(p.entries,p.sexo):null;
      const ctDot={x:'🔴',a:'🟡',ok:'🟢'}[ct]||'';
      return`<div class="pac-card" onclick="openPac('${p.id}')">
        <div class="pac-avatar">${esc(initials(p.nome))}</div>
        <div style="flex:1;min-width:0">
          <div class="pac-nome">${esc(p.nome)}</div>
          <div class="pac-info">${age!==null?age+' anos':fmtDate(p.dataNasc)}${p.diagnostico?' · '+p.diagnostico.split('\n')[0].substring(0,35)+(p.diagnostico.length>35?'…':''):''}</div>
          <div class="pac-tags">
            ${p.gestacao?`<span class="tag gest">🤰 ${esc(p.gestacao)}</span>`:''}
            ${numEx?`<span class="tag exames">${ctDot} ${numEx} exame${numEx>1?'s':''}</span>`:''}
          </div>
        </div>
        <i class="ti ti-chevron-right" style="color:var(--color-text-tertiary);font-size:16px" aria-hidden="true"></i>
      </div>`;
    }).join('')}
  </div>`;
}

function buildForm(){
  const f=st.form;const isEdit=!!(f&&f.id);
  return`<div class="hdr">
    <div class="hdr-row">
      <button class="back-btn" onclick="cancelForm()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <div class="hdr-left"><h1>${isEdit?'Editar paciente':'Nova paciente'}</h1></div>
    </div>
  </div>
  <div class="content" style="padding-bottom:20px">
    <div class="form-section">
      <h2>Identificação</h2>
      <div class="field">
        <label>Nome completo *</label>
        <input type="text" id="f_nome" value="${esc(f?.nome||'')}" placeholder="Nome da paciente" oninput="fv('nome',this.value)" autocomplete="off" />
      </div>
      <div class="field">
        <label>Data de nascimento</label>

      </div>
      <div class="field">
        <label>Sexo biológico</label>
        <div class="sex-wrap">
          <button class="sex-btn ${f?.sexo!=='M'?'on':''}" onclick="fv('sexo','F')">Feminino</button>
          <button class="sex-btn ${f?.sexo==='M'?'on':''}" onclick="fv('sexo','M')">Masculino</button>
        </div>
      </div>
    </div>
    <div class="form-section">
      <h2>Dados clínicos</h2>
      <div class="field">
        <label>Semanas de gestação</label>
        <input type="text" id="f_gest" value="${esc(f?.gestacao||'')}" placeholder="Ex.: 28 semanas (opcional)" oninput="fv('gestacao',this.value)" autocomplete="off" />
        <div class="field-hint">Deixe em branco se não gestante.</div>
      </div>
      <div class="field">
        <label>Diagnóstico prévio</label>
        <textarea id="f_diag" placeholder="Ex.: ICC, DM2, HAS..." oninput="fv('diagnostico',this.value)">${esc(f?.diagnostico||'')}</textarea>
      </div>

    <button class="save-btn" onclick="savePac()"><i class="ti ti-check" aria-hidden="true"></i>${isEdit?'Salvar alterações':'Cadastrar paciente'}</button>
    ${isEdit?`<button class="del-btn" onclick="deletePac('${f.id}')"><i class="ti ti-trash" aria-hidden="true"></i>Excluir paciente</button>`:''}
  </div>`;
}

function buildPatientView(){
  const p=st.currentPac;if(!p)return'';
  const age=calcAge(p.dataNasc);
  const sub=[age!==null?age+' anos':'',p.gestacao?'🤰 '+p.gestacao:''].filter(Boolean).join(' · ');
  const inRefSub=(st.tab==='ref'&&st.refSc!=='cats');
  const backFn=inRefSub?'goBack()':'closePac()';
  let hdrTitle=esc(p.nome);
  let hdrSub=sub;
  if(st.tab==='ref'&&st.refSc==='catExams'&&st.refCat){
    const cm=CATS_META.find(c=>c.id===st.refCat);
    hdrTitle=cm?esc(cm.name):'Exames';
    hdrSub='';
  } else if(st.tab==='ref'&&st.refSc==='examDetail'&&st.refExam){
    hdrTitle=esc(st.refExam.name);
    hdrSub='';
  }
  return`<div class="hdr">
    <div class="hdr-row">
      <button class="back-btn" onclick="${backFn}">←</button>
      <div class="hdr-left"><h1>${hdrTitle}</h1>${hdrSub?`<p>${hdrSub}</p>`:''}</div>
      ${!inRefSub?`<button class="icon-btn" onclick="openForm('${p.id}')"><i class="ti ti-edit" aria-hidden="true"></i> Editar</button>`:''}
    </div>
    ${st.tab==='ref'&&st.refSc==='cats'||st.tab==='eval'?`<div class="search-wrap"><i class="ti ti-search si" aria-hidden="true"></i>
      <input type="text" placeholder="${st.tab==='eval'?'Buscar exame para adicionar...':'Buscar exame ou categoria...'}" value="${esc(st.q)}" oninput="setQ(this.value)" />
      ${st.q?`<button class="sc" onclick="setQ('')"><i class="ti ti-x" aria-hidden="true"></i></button>`:''}
    </div>`:''}
  </div>
  <div class="content">${buildPacContent(p)}</div>
  <div class="nav">
    ${[{id:'ref',ic:'ti-book-2',lbl:'Referência'},{id:'eval',ic:'ti-pencil-plus',lbl:`Avaliar${Object.keys(p.entries||{}).length?' ('+Object.keys(p.entries||{}).length+')':''}`},{id:'conduta',ic:'ti-clipboard-check',lbl:'Conduta'}]
    .map(t=>`<button class="nav-btn ${st.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><i class="ti ${t.ic}" aria-hidden="true"></i>${esc(t.lbl)}</button>`).join('')}
  </div>`;
}

function buildPacContent(p){
  if(st.tab==='ref'){
    if(st.q.trim()) return buildRefSearch(p);
    if(st.refSc==='cats') return buildRefCats();
    if(st.refSc==='catExams') return buildRefCatExams();
    if(st.refSc==='examDetail') return buildExamDetail(p);
  }
  if(st.tab==='eval') return buildEvalTab(p);
  if(st.tab==='conduta') return buildCondutaTab(p);
  return '';
}

function buildRefSearch(p){
  const q=st.q.toLowerCase();
  const res=EX.filter(e=>e.name.toLowerCase().includes(q)||e.abbr.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q));
  if(!res.length)return`<div class="empty"><i class="ti ti-search" aria-hidden="true"></i>Nenhum resultado</div>`;
  let html=`<div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px">${res.length} resultado(s)</div>`;
  res.forEach(e=>{html+=examListItem(e);});return html;
}
function buildRefCats(){
  return'<div class="cat-grid">'+CATS_WITH_EX.map(c=>`<div class="cat-card" onclick="openCat('${c.id}')"><div class="cat-icon" style="background:${c.bg}">${c.icon}</div><div class="cat-name">${esc(c.name)}</div><div class="cat-cnt">${c.exams.length} exames</div></div>`).join('')+'</div>';
}
function buildRefCatExams(){
  return EX.filter(e=>e.cat===st.refCat).map(e=>examListItem(e)).join('');
}
function examListItem(e){
  const cl={x:'bx',a:'ba',ok:'bok',m:'bm'}[e.ct]||'bm';
  const lbl={x:'Contraindicado',a:'Com restrição',ok:'Indicado',m:'Verificar'}[e.ct]||'—';
  return`<div class="eli" onclick="openExam('${e.id}')"><div><div class="eli-name">${esc(e.name)}</div><div class="eli-sub">${esc(e.sub)}</div></div><span class="badge ${cl}">${lbl}</span></div>`;
}
function buildExamDetail(p){
  const e=st.refExam;if(!e)return'';
  const sex=p.sexo||'F';const isAdded=(p.entries||{})[e.id]!==undefined;
  const cc={x:'x',a:'a',ok:'ok',m:'m'};
  return`
  <div class="det-section"><div class="det-lbl">Descrição fisiológica</div><div class="det-val">${esc(e.desc)}</div></div>
  <div class="det-section"><div class="det-lbl">Valores de referência</div><div class="ref-box">${esc(refStr(e,sex))}</div></div>
  <div class="det-section"><div class="det-lbl">Alterações clínicas</div><div class="det-val">${esc(e.altClin)}</div></div>
  <div class="det-section"><div class="det-lbl">Avaliar em conjunto com</div><div class="chips">${e.related.map(r=>`<span class="chip">${esc(r)}</span>`).join('')}</div></div>
  <div class="det-section"><div class="det-lbl">Relação com exercício físico</div><div class="det-val">${esc(e.exRel)}</div></div>
  <div class="det-section"><div class="det-lbl">Conduta clínica</div><div class="cond-box ${cc[e.ct]||'m'}">${esc(e.condText)}</div></div>
  <button class="add-to-eval-btn ${isAdded?'added':''}" ${isAdded?'':'onclick="addAndGoEval(\''+e.id+'\')"'}>
    <i class="ti ${isAdded?'ti-check':'ti-circle-plus'}" aria-hidden="true"></i>${isAdded?'Já adicionado à avaliação':'Adicionar à avaliação'}
  </button>`;
}

function buildEvalTab(p){
  const sex=p.sexo||'F';const entries=p.entries||{};
  const added=EX.filter(e=>entries[e.id]!==undefined);
  const nAdded=added.length;

  // ── barra de modo ────────────────────────────────────────────────────────
  const modeBar=`<div style="display:flex;gap:6px;margin-bottom:14px">
    <button onclick="setEvalMode('select')" style="flex:1;padding:8px;border:1.5px solid ${st.evalMode==='select'?'var(--color-text-info)':'var(--color-border-secondary)'};border-radius:var(--border-radius-md);background:${st.evalMode==='select'?'var(--color-background-info)':'var(--color-background-secondary)'};color:${st.evalMode==='select'?'var(--color-text-info)':'var(--color-text-secondary)'};font-size:12px;font-weight:${st.evalMode==='select'?'600':'400'};cursor:pointer;font-family:inherit">
      <i class="ti ti-checkbox" style="margin-right:4px"></i>Selecionar exames${nAdded?' ('+nAdded+')':''}
    </button>
    <button onclick="setEvalMode('fill')" style="flex:1;padding:8px;border:1.5px solid ${st.evalMode==='fill'?'var(--color-text-info)':'var(--color-border-secondary)'};border-radius:var(--border-radius-md);background:${st.evalMode==='fill'?'var(--color-background-info)':'var(--color-background-secondary)'};color:${st.evalMode==='fill'?'var(--color-text-info)':'var(--color-text-secondary)'};font-size:12px;font-weight:${st.evalMode==='fill'?'600':'400'};cursor:pointer;font-family:inherit;opacity:${nAdded?'1':'0.4'}" ${!nAdded?'disabled':''}>
      <i class="ti ti-pencil" style="margin-right:4px"></i>Inserir valores
    </button>
  </div>`;

  // ── modo SELECIONAR ──────────────────────────────────────────────────────
  if(st.evalMode==='select'){
    let html=modeBar;
    if(p.diagnostico||p.gestacao){html+=`<div class="pac-info-bar"><strong>${esc(p.nome)}</strong>${calcAge(p.dataNasc)?' · '+calcAge(p.dataNasc)+' anos':''}${p.gestacao?' · 🤰 '+p.gestacao:''}</div>`;}
    if(st.q.trim()){
      const q=st.q.toLowerCase();
      const res=EX.filter(e=>e.name.toLowerCase().includes(q)||e.abbr.toLowerCase().includes(q));
      if(!res.length){html+=`<div class="empty" style="padding:28px 0"><i class="ti ti-search" aria-hidden="true"></i>Nenhum resultado</div>`;}
      else{res.forEach(e=>{const isAdded=entries[e.id]!==undefined;html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px"><div><div style="font-size:13px;font-weight:500">${esc(e.name)}</div><div style="font-size:11px;color:var(--color-text-tertiary)">${esc(CATS_META.find(c=>c.id===e.cat)?.name||e.cat)}</div></div><button class="add-btn ${isAdded?'chk':''}" ${isAdded?'disabled':'onclick="addExam(\''+e.id+'\')"'}><i class="ti ${isAdded?'ti-check':'ti-plus'}" aria-hidden="true"></i></button></div>`;});}
      return html;
    }
    CATS_WITH_EX.forEach(c=>{
      const isOpen=st.accOpen===c.id;
      const catAdded=c.exams.filter(e=>entries[e.id]!==undefined).length;
      html+=`<div class="acc-cat"><div class="acc-hdr" onclick="toggleAcc('${c.id}')">
        <div class="acc-title">${c.icon} ${esc(c.name)} <span class="acc-cnt">${c.exams.length} exames${catAdded?' · '+catAdded+' ✓':''}</span></div>
        <i class="ti ti-chevron-down acc-chev ${isOpen?'open':''}" aria-hidden="true"></i></div>
        ${isOpen?`<div class="acc-body">${c.exams.map(e=>{const isAdded=entries[e.id]!==undefined;return`<div class="aer"><div><div class="aer-name">${esc(e.name)}</div><div class="aer-unit">${esc(e.unit)}</div></div><button class="add-btn ${isAdded?'chk':''}" ${isAdded?'disabled':'onclick="addExam(\''+e.id+'\')"'}><i class="ti ${isAdded?'ti-check':'ti-plus'}" aria-hidden="true"></i></button></div>`;}).join('')}</div>`:''}</div>`;
    });
    if(nAdded){
      html+=`<button onclick="setEvalMode('fill')" style="width:100%;margin-top:10px;padding:13px;border:none;border-radius:var(--border-radius-lg);background:var(--color-background-info);color:var(--color-text-info);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit">
        <i class="ti ti-pencil-plus" aria-hidden="true"></i> Inserir valores para ${nAdded} exame${nAdded>1?'s':''} →
      </button>`;
    }
    return html;
  }

  // ── modo INSERIR VALORES ─────────────────────────────────────────────────
  let html=modeBar;
  if(!nAdded)return html+`<div class="empty"><i class="ti ti-checkbox" aria-hidden="true"></i><p>Nenhum exame selecionado.</p><p style="margin-top:8px;font-size:12px">Volte à aba Selecionar.</p></div>`;
  if(p.diagnostico||p.gestacao){html+=`<div class="pac-info-bar"><strong>${esc(p.nome)}</strong>${calcAge(p.dataNasc)?' · '+calcAge(p.dataNasc)+' anos':''}${p.gestacao?' · 🤰 '+p.gestacao:''}</div>`;}
  added.forEach(e=>{html+=buildExCard(e,entries,sex);});
  return html;
}
function buildExCard(e,entries,sex){
  const val=entries[e.id]||'';const res=val!==''?evExam(e,val,sex):null;const c=res?res.c:'';
  let inputHtml;
  if(e.binary){
    inputHtml=`<div class="ex-inp-row"><div class="sex-wrap" style="gap:5px"><button class="sex-btn ${!val||val==='0'?'on':''}" onclick="setVal('${e.id}','0')">Normal</button><button class="sex-btn ${val==='1'?'on':''}" style="${val==='1'?'border-color:var(--color-text-danger);background:var(--color-background-danger);color:var(--color-text-danger)':''}" onclick="setVal('${e.id}','1')">Elevada</button></div></div>`;
  } else {
	inputHtml=`<div class="ex-inp-row"><input type="number" step="${e.step||'any'}" inputmode="decimal" placeholder="—" value="${esc(val)}" onchange="setVal('${e.id}',this.value)" /><span class="ex-unit">${esc(e.unit)}</span></div>`;
  }
  return`<div class="ex-card"><div class="ex-card-hd"><div><div class="ex-name">${esc(e.name)}</div><div class="ex-sub">${esc(CATS_META.find(cm=>cm.id===e.cat)?.name||e.cat)}</div></div><button class="rm-btn" onclick="removeExam('${e.id}')"><i class="ti ti-x" aria-hidden="true"></i></button></div>
  ${inputHtml}<div class="ex-ref">VR: ${esc(refStr(e,sex))}</div>
  ${res?`<div class="cstrip ${c}"><div class="cst"><i class="ti ${c==='x'?'ti-circle-x':c==='a'?'ti-alert-triangle':'ti-circle-check'}" aria-hidden="true"></i>${esc(res.st)}</div><div class="ccd">${esc(res.cd)}</div></div>${res.tip?`<div class="tip">${esc(res.tip)}</div>`:''}`:''}
  </div>`;
}

function buildCondutaTab(p){
  const entries=p.entries||{};const sex=p.sexo||'F';
  const added=EX.filter(e=>entries[e.id]!==undefined);
  if(!added.length)return`<div class="empty"><i class="ti ti-clipboard" aria-hidden="true"></i>Nenhum exame inserido ainda.<br><span style="font-size:12px">Vá para a aba Avaliar.</span></div>`;
  const ct=overallCt(entries,sex)||'ok';
  const hi={x:{cls:'x',ic:'ti-circle-x',lbl:'Conduta geral',main:'Contraindicado'},a:{cls:'a',ic:'ti-alert-triangle',lbl:'Conduta geral',main:'Com restrição'},ok:{cls:'ok',ic:'ti-circle-check',lbl:'Conduta geral',main:'Indicado'}}[ct];
  let html=`<div class="pac-info-bar"><strong>${esc(p.nome)}</strong>${calcAge(p.dataNasc)?' · '+calcAge(p.dataNasc)+' anos':''}${p.gestacao?' · 🤰 '+p.gestacao:''}</div>`;
  html+=`<div class="sum-hero ${hi.cls}"><div class="sh-lbl"><i class="ti ${hi.ic}" style="margin-right:4px" aria-hidden="true"></i>${hi.lbl}</div><div class="sh-val">${hi.main}</div></div>`;
  const groups={x:[],a:[],ok:[]};
  added.forEach(e=>{const val=entries[e.id];const res=val!==''?evExam(e,val,sex):null;const g=res?res.c:'ok';(groups[g]||groups['ok']).push({e,val,res});});
  ['x','a','ok'].forEach(g=>{groups[g].forEach(({e,val,res})=>{
    const vd=e.binary?(val==='1'?'Elevada':'Normal'):`${val} ${e.unit}`;
    html+=`<div class="sum-row"><div class="sdot ${g}"></div><div style="flex:1"><div class="sr-nm">${esc(e.name)}</div><div class="sr-vl">${esc(vd)} · VR: ${esc(refStr(e,sex))}</div>${res?`<div class="sr-cd ${g}">${esc(res.cd)}</div>`:''}</div></div>`;
  });});
  html+=`<div class="disc"><i class="ti ti-info-circle" style="margin-right:4px" aria-hidden="true"></i>Ferramenta de apoio à decisão. O julgamento clínico individualizado é insubstituível.</div>`;
  return html;
}

// Event handlers
function openForm(id){
  if(id===null){
    st.form={id:null,nome:'',dataNasc:'',sexo:'F',gestacao:'',diagnostico:'',entries:{}};
  } else {
    const p=st.patients.find(x=>x.id===id)||st.currentPac;
    st.form=p?{...p}:null;
  }
  st.screen='form';render();
}
function cancelForm(){
  st.screen=st.currentPac?'patientView':'patients';
  st.form=null;render();
}
function fv(field,val){
  if(!st.form)return;
  st.form[field]=val;
  const el=document.getElementById('f_'+{nome:'nome',dataNasc:'dob',gestacao:'gest',diagnostico:'diag',sexo:'sexo'}[field]);
  if(field==='sexo'){render();return;}
  // just update state without full re-render
}
function savePac(){
  const f=st.form;if(!f||!f.nome.trim()){alert('Informe o nome da paciente.');return;}
  if(f.id){
    const idx=st.patients.findIndex(p=>p.id===f.id);
    if(idx>=0){st.patients[idx]={...st.patients[idx],...f,atualizadoEm:new Date().toISOString()};}
    if(st.currentPac&&st.currentPac.id===f.id)st.currentPac=st.patients[idx>=0?idx:0];
  } else {
    const np={...f,id:uid(),entries:{},criadoEm:new Date().toISOString(),atualizadoEm:new Date().toISOString()};
    st.patients.unshift(np);st.currentPac=np;
  }
  savePacs();st.form=null;st.screen=st.currentPac?'patientView':'patients';
  st.tab='eval';st.refSc='cats';render();
}
function deletePac(id){
  if(!confirm('Excluir esta paciente? Esta ação não pode ser desfeita.'))return;
  st.patients=st.patients.filter(p=>p.id!==id);
  savePacs();st.currentPac=null;st.form=null;st.screen='patients';render();
}
function openPac(id){
  const p=st.patients.find(x=>x.id===id);if(!p)return;
  st.currentPac=p;st.screen='patientView';st.tab='eval';st.refSc='cats';st.q='';st.accOpen=null;render();
}
function closePac(){st.screen='patients';st.currentPac=null;st.q='';render();}
function setTab(t){st.tab=t;if(t!=='ref')st.q='';if(t==='eval'){st.accOpen=null;if(!st.currentPac||!Object.keys(st.currentPac.entries||{}).length)st.evalMode='select';}render();}
function setEvalMode(m){st.evalMode=m;render();}
function setQ(v){st.q=v;render();}
function openCat(id){st.refCat=id;st.refSc='catExams';render();}
function openExam(id){const ex=EX.find(e=>e.id===id);if(ex){st.refExam=ex;st.refSc='examDetail';render();}}
function goBack(){
  if(st.refSc==='examDetail')st.refSc='catExams';
  else if(st.refSc==='catExams'){st.refSc='cats';st.refCat=null;}
  render();
}
function toggleAcc(id){st.accOpen=st.accOpen===id?null:id;render();}
function addExam(id){
  if(!st.currentPac)return;
  if(!st.currentPac.entries)st.currentPac.entries={};
  if(st.currentPac.entries[id]===undefined){
    st.currentPac.entries[id]='';
    syncAndSave();st.q='';render();
  }
}
function removeExam(id){
  if(!st.currentPac||!st.currentPac.entries)return;
  delete st.currentPac.entries[id];syncAndSave();render();
}
function setVal(id,v){
  if(!st.currentPac)return;
  if(!st.currentPac.entries)st.currentPac.entries={};
  st.currentPac.entries[id]=v;syncAndSave();render();
}
function addAndGoEval(id){addExam(id);st.tab='eval';render();}
function syncAndSave(){
  if(!st.currentPac)return;
  const idx=st.patients.findIndex(p=>p.id===st.currentPac.id);
  if(idx>=0){st.patients[idx]=st.currentPac;st.patients[idx].atualizadoEm=new Date().toISOString();}
  savePacs();
}

loadPacs();
</script>
