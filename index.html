<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ExamesEF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Exames Lab · EF Hospitalar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<style>
:root {
  --bg: #f1f3f4;
  --bg1: #ffffff;
  --bg2: #f8f9fa;
  --bgi: #e8f0fe;
  --bgs: #e6f4ea;
  --bgw: #fef7e0;
  --bgd: #fce8e8;
  --t1: #202124;
  --t2: #5f6368;
  --t3: #9aa0a6;
  --ti: #1a73e8;
  --ts: #188038;
  --tw: #b06000;
  --td: #c5221f;
  --bl: rgba(0,0,0,0.1);
  --bm: rgba(0,0,0,0.2);
  --bs: rgba(0,0,0,0.35);
  --bd: #c5221f;
  --rm: 8px;
  --rl: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --bg1: #1e1e1e;
    --bg2: #2d2d2d;
    --bgi: #1a3560;
    --bgs: #0d3b20;
    --bgw: #3d2800;
    --bgd: #3b1515;
    --t1: #e8eaed;
    --t2: #9aa0a6;
    --t3: #5f6368;
    --ti: #8ab4f8;
    --ts: #81c995;
    --tw: #fdd663;
    --td: #f28b82;
    --bl: rgba(255,255,255,0.08);
    --bm: rgba(255,255,255,0.16);
    --bs: rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh}
#root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--bg1);border-bottom:0.5px solid var(--bl);padding:12px 16px 10px;position:sticky;top:0;z-index:20}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-left{min-width:0;flex:1}
.hdr-left h1{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1)}
.hdr-left p{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back-btn{background:none;border:none;cursor:pointer;color:var(--t2);padding:4px 8px 4px 0;font-size:20px;display:flex;align-items:center;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid var(--bm);border-radius:var(--rm);cursor:pointer;color:var(--t1);padding:7px 13px;font-size:13px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.icon-btn.primary{background:var(--bgi);color:var(--ti);border-color:transparent;font-weight:500}
.search-wrap{position:relative;margin-top:10px}
.search-wrap input{width:100%;padding:9px 36px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--t1);font-size:13px;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:var(--ti)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px;pointer-events:none}
.sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center}
.content{flex:1;padding:12px 16px 80px}
.nav{display:flex;background:var(--bg1);border-top:0.5px solid var(--bl);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:20}
.nav-btn{flex:1;padding:10px 4px 14px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:10px;font-family:inherit}
.nav-btn.on{color:var(--ti)}
.nav-btn i{font-size:22px}
/* patients */
.pac-card{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:13px;transition:border-color .15s}
.pac-card:active{background:var(--bg2)}
.pac-av{width:42px;height:42px;border-radius:50%;background:var(--bgi);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--ti);flex-shrink:0}
.pac-nome{font-size:14px;font-weight:600;margin-bottom:2px;color:var(--t1)}
.pac-info{font-size:12px;color:var(--t2)}
.pac-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--bl);color:var(--t2)}
.tag.gest{background:var(--bgi);color:var(--ti);border-color:transparent}
.tag.ex{font-weight:500}
.tag.ex-ok{background:var(--bgs);color:var(--ts);border-color:transparent}
.tag.ex-a{background:var(--bgw);color:var(--tw);border-color:transparent}
.tag.ex-x{background:var(--bgd);color:var(--td);border-color:transparent}
/* form */
.form-sec{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);padding:16px;margin-bottom:10px}
.form-sec h2{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:10px 12px;border:0.5px solid var(--bm);border-radius:var(--rm);background:var(--bg2);color:var(--t1);font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--ti)}
.field textarea{resize:none;min-height:80px;line-height:1.5}
.field-hint{font-size:11px;color:var(--t3);margin-top:5px}
.sex-wrap{display:flex;gap:6px}
.sex-btn{flex:1;padding:9px;font-size:13px;border-radius:var(--rm);border:1.5px solid var(--bm);background:var(--bg2);color:var(--t2);cursor:pointer;font-weight:400;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;font-family:inherit}
.sex-btn.on{border-color:var(--ti);background:var(--bgi);color:var(--ti);font-weight:600}
.sex-btn.on::before{content:'✓';font-size:12px}
.save-btn{width:100%;padding:14px;border:none;border-radius:var(--rl);background:var(--ti);color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px;font-family:inherit;transition:opacity .15s}
.save-btn:active{opacity:.85}
.del-btn{width:100%;padding:12px;border:0.5px solid var(--td);border-radius:var(--rl);background:transparent;color:var(--td);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-family:inherit}
/* badges */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.bx{background:var(--bgd);color:var(--td)}
.ba{background:var(--bgw);color:var(--tw)}
.bok{background:var(--bgs);color:var(--ts)}
.bm{background:var(--bgi);color:var(--ti)}
/* cat grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-card{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px 13px;cursor:pointer;transition:border-color .15s}
.cat-card:active{background:var(--bg2)}
.cat-icon{font-size:22px;width:38px;height:38px;border-radius:var(--rm);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.cat-name{font-size:12px;font-weight:600;line-height:1.3;color:var(--t1)}
.cat-cnt{font-size:11px;color:var(--t3);margin-top:2px}
/* exam list */
.eli{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rm);padding:12px 13px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s}
.eli:active{background:var(--bg2)}
.eli-name{font-size:13px;font-weight:600;color:var(--t1)}
.eli-sub{font-size:11px;color:var(--t3);margin-top:2px}
/* detail */
.det-sec{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.det-lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.det-val{font-size:13px;line-height:1.6;color:var(--t1)}
.ref-box{background:var(--bg2);border-radius:var(--rm);padding:10px 12px;font-size:13px;color:var(--t2);line-height:1.5;font-family:monospace}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{font-size:11px;padding:3px 8px;background:var(--bg2);border:0.5px solid var(--bl);border-radius:20px;color:var(--t2)}
.cond-box{border-radius:var(--rm);padding:12px 14px;font-size:13px;line-height:1.55}
.cond-box.x{background:var(--bgd);color:var(--td)}
.cond-box.a{background:var(--bgw);color:var(--tw)}
.cond-box.ok{background:var(--bgs);color:var(--ts)}
.cond-box.m{background:var(--bg2);color:var(--t2)}
.add-to-eval{width:100%;padding:13px;border:none;border-radius:var(--rl);background:var(--bgi);color:var(--ti);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:2px;font-family:inherit}
.add-to-eval.added{background:var(--bgs);color:var(--ts);cursor:default}
/* exam cards */
.ex-card{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.ex-card-hd{padding:11px 13px 7px;display:flex;align-items:flex-start;justify-content:space-between}
.ex-name{font-size:13px;font-weight:600;color:var(--t1)}
.ex-sub{font-size:11px;color:var(--t3);margin-top:1px}
.rm-btn{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:3px;border-radius:4px;flex-shrink:0;display:flex;align-items:center}
.rm-btn:hover{color:var(--td)}
.ex-inp-row{padding:0 13px 9px;display:flex;align-items:center;gap:9px}
.ex-inp-row input{flex:1;padding:9px 11px;border:0.5px solid var(--bm);border-radius:var(--rm);font-size:16px;font-weight:600;background:var(--bg2);color:var(--t1);outline:none;font-family:monospace;transition:border-color .15s}
.ex-inp-row input:focus{border-color:var(--ti)}
.ex-unit{font-size:12px;color:var(--t3);min-width:36px;flex-shrink:0}
.ex-ref{padding:0 13px 9px;font-size:11px;color:var(--t3)}
.cstrip{padding:10px 13px;border-top:0.5px solid var(--bl)}
.cstrip.x{background:var(--bgd)}.cstrip.a{background:var(--bgw)}.cstrip.ok{background:var(--bgs)}
.cstrip .cst{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:3px}
.cstrip.x .cst,.cstrip.x .ccd{color:var(--td)}
.cstrip.a .cst,.cstrip.a .ccd{color:var(--tw)}
.cstrip.ok .cst,.cstrip.ok .ccd{color:var(--ts)}
.ccd{font-size:12px;line-height:1.5}
.ctip{padding:5px 13px 10px;font-size:11px;color:var(--t3);line-height:1.5}
/* accordion */
.acc-cat{background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.acc-hdr{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acc-hdr:active{background:var(--bg2)}
.acc-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--t1)}
.acc-cnt{font-size:11px;color:var(--t3);font-weight:400}
.acc-chev{font-size:16px;color:var(--t3);transition:transform .2s}
.acc-chev.open{transform:rotate(180deg)}
.acc-body{border-top:0.5px solid var(--bl)}
.aer{padding:10px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bl)}
.aer:last-child{border-bottom:none}
.aer-name{font-size:13px;color:var(--t1)}.aer-unit{font-size:11px;color:var(--t3);margin-top:1px}
.add-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--bm);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ti);font-size:17px;flex-shrink:0;transition:all .15s}
.add-btn:active{background:var(--bgi)}
.add-btn.chk{background:var(--bgs);border-color:transparent;color:var(--ts);cursor:default}
/* conduta */
.sum-hero{border-radius:var(--rl);padding:18px;margin-bottom:13px;text-align:center}
.sum-hero.ok{background:var(--bgs)}.sum-hero.a{background:var(--bgw)}.sum-hero.x{background:var(--bgd)}
.sh-lbl{font-size:11px;font-weight:600;margin-bottom:5px}
.sh-val{font-size:22px;font-weight:700}
.sum-hero.ok .sh-lbl,.sum-hero.ok .sh-val{color:var(--ts)}
.sum-hero.a .sh-lbl,.sum-hero.a .sh-val{color:var(--tw)}
.sum-hero.x .sh-lbl,.sum-hero.x .sh-val{color:var(--td)}
.sum-row{display:flex;gap:10px;padding:11px 13px;background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rm);margin-bottom:8px;align-items:flex-start}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sdot.x{background:var(--td)}.sdot.a{background:var(--tw)}.sdot.ok{background:var(--ts)}
.sr-nm{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--t1)}
.sr-vl{font-size:11px;color:var(--t3)}
.sr-cd{font-size:12px;margin-top:3px}
.sr-cd.x{color:var(--td)}.sr-cd.a{color:var(--tw)}.sr-cd.ok{color:var(--ts)}
.sr-tip{font-size:11px;color:var(--t3);margin-top:2px}
.disc{font-size:11px;color:var(--t3);background:var(--bg2);border-radius:var(--rm);padding:11px 13px;margin-top:13px;line-height:1.6}
/* misc */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty i{font-size:32px;display:block;margin-bottom:10px}
.empty p{font-size:13px;color:var(--t2);margin-top:6px}
.sec-hdr{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-hdr a{font-size:11px;color:var(--ti);font-weight:500;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none}
.pac-info-bar{background:var(--bg2);border-radius:var(--rm);padding:10px 13px;margin-bottom:13px;font-size:12px;color:var(--t2);line-height:1.7}
.pac-info-bar strong{color:var(--t1);font-weight:600}
.search-result-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg1);border:0.5px solid var(--bl);border-radius:var(--rm);margin-bottom:8px}
.loading{text-align:center;padding:60px 20px;color:var(--t3)}
.loading i{font-size:28px;display:block;margin-bottom:10px}
</style>
</head>

<script>
// ─── Firebase ───────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDU1brp4LdFtf0QL9gq0RtpkSexU2rG7HE",
  authDomain: "conduta-residencia.firebaseapp.com",
  projectId: "conduta-residencia",
  storageBucket: "conduta-residencia.firebasestorage.app",
  messagingSenderId: "462838216816",
  appId: "1:462838216816:web:b488f698031f713d81dcb5"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence().catch(e => console.log('Offline persistence:', e.code));

// ─── Dados de exames ─────────────────────────────────────────────────────────
const CATS_META = [
  {id:'hemograma',name:'Hemograma',icon:'🩸',bg:'#fef2f2'},
  {id:'inflamatorio',name:'Inflamatórios',icon:'🔥',bg:'#fef3c7'},
  {id:'cardiaco',name:'Cardíacos',icon:'❤️',bg:'#fef2f2'},
  {id:'gasometria',name:'Gasometria',icon:'🫁',bg:'#f0fdf4'},
  {id:'eletrolitos',name:'Eletrólitos',icon:'⚡',bg:'#f0f9ff'},
  {id:'renal',name:'Renal',icon:'🫘',bg:'#eff6ff'},
  {id:'muscular',name:'Lesão muscular',icon:'💪',bg:'#fdf4ff'},
  {id:'hepatico',name:'Hepático',icon:'🫀',bg:'#fff7ed'},
  {id:'glicidico',name:'Glicídico',icon:'🍬',bg:'#fff7ed'},
  {id:'ferro',name:'Ferro / Anemias',icon:'⚗️',bg:'#fffbeb'},
  {id:'vitaminas',name:'Vitaminas',icon:'💊',bg:'#f0fdf4'},
  {id:'lipidico',name:'Lipídico',icon:'🧪',bg:'#fffbeb'},
  {id:'hemostasia',name:'Hemostasia',icon:'🩹',bg:'#fdf4ff'}
];

const EX = [
  {id:'hb',name:'Hemoglobina (Hb)',abbr:'Hb',cat:'hemograma',sub:'Série vermelha',unit:'g/dL',step:'0.1',sexDep:true,desc:'Proteína eritrocitária responsável pelo transporte de oxigênio.',altClin:'↑ policitemia, DPOC, desidratação | ↓ anemia ferropriva, def. B12/folato, hemólise, IRC',related:['Ht','ferritina','VCM','reticulócitos'],exRel:'Exercício agudo pode elevar por hemoconcentração.',condText:'< 8 g/dL → contraindicado | 8–10 g/dL → com restrição | ≥ 10 g/dL → indicado se estável | ↑ importante → investigar',ct:'m',refD:s=>s==='M'?'13,5–17,5 g/dL':'12,0–15,5 g/dL',ev:(v,s)=>{if(v<8)return{c:'x',st:'Criticamente baixo',cd:'Contraindicado — risco de hipóxia grave.',tip:'Aguardar avaliação médica.'};if(v<10)return{c:'a',st:'Anemia moderada',cd:'Com restrição — apenas baixa intensidade.',tip:'Monitorar SpO₂ e sintomas.'};const lo=s==='M'?13.5:12,hi=s==='M'?17.5:15.5;if(v<lo)return{c:'a',st:'Levemente abaixo do VR',cd:'Indicado com cautela se assintomático.',tip:'Avaliar Ht, ferritina e contexto.'};if(v<=hi)return{c:'ok',st:'Normal',cd:'Indicado.',tip:'Sem restrição por Hb.'};return{c:'a',st:'Elevado — investigar',cd:'Contraindicado até esclarecimento.',tip:'Avaliar policitemia, desidratação, DPOC.'}}},

  {id:'vitd',name:'Vitamina D (25-OH)',abbr:'Vit D',cat:'vitaminas',sub:'Vitaminas',unit:'ng/mL',step:'0.5',sexDep:false,desc:'Marcador do estoque corporal de vitamina D.',altClin:'↑ suplementação excessiva | ↓ deficiência, baixa exposição solar',related:['Cálcio','fósforo','PTH'],exRel:'Níveis adequados favorecem função muscular.',condText:'Déficit importante pede correção; não contraindica isoladamente.',ct:'ok',refD:_=>'20–60 ng/mL',ev:(v)=>{if(v<10)return{c:'a',st:'Deficiência grave',cd:'Com restrição — função muscular comprometida.',tip:''};if(v<20)return{c:'a',st:'Deficiência',cd:'Indicado com cautela — repor.',tip:''};if(v<=60)return{c:'ok',st:'Normal',cd:'Indicado.',tip:''};return{c:'a',st:'Possivelmente elevada',cd:'Investigar suplementação excessiva.',tip:''}}}
];

const CATS_WITH_EX = CATS_META.map(c=>({...c,exams:EX.filter(e=>e.cat===c.id)})).filter(c=>c.exams.length>0);

// ─── Estado ──────────────────────────────────────────────────────────────────
let st = {
  screen:'patients', patients:[], currentPac:null, form:null,
  tab:'eval', refSc:'cats', refCat:null, refExam:null, accOpen:null, q:''
};

// ─── Firestore ───────────────────────────────────────────────────────────────
function initFirestore() {
  db.collection('patients').orderBy('criadoEm','asc').onSnapshot(snap => {
    st.patients = snap.docs.map(d => ({...d.data(), id: d.id}));
    if (st.currentPac) {
      const updated = st.patients.find(p => p.id === st.currentPac.id);
      if (updated) st.currentPac = updated;
    }
    render();
  }, err => { console.error('Firestore:', err); render(); });
}

async function savePacToDb(pac) {
  try {
    const {id, ...data} = pac;
    await db.collection('patients').doc(id).set({...data, atualizadoEm: new Date().toISOString()});
  } catch(e) { console.error('Save:', e); }
}

async function deletePacFromDb(id) {
  try { await db.collection('patients').doc(id).delete(); }
  catch(e) { console.error('Delete:', e); }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function uid() { return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2,5); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function calcAge(dob) {
  if(!dob) return null;
  try { const d=new Date(dob+'T00:00:00'),t=new Date(); let a=t.getFullYear()-d.getFullYear(); const m=t.getMonth()-d.getMonth(); if(m<0||(m===0&&t.getDate()<d.getDate()))a--; return a<0?null:a; } catch(e){return null;}
}
function fmtDate(s) { if(!s) return '—'; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function initials(n) { return n.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')||'?'; }
function refStr(e,sex) { return typeof e.refD==='function' ? e.refD(sex) : e.refD; }
function evExam(exam,val,sex) {
  if(exam.binary){ return exam.ev(val==='1'?1:0,sex); }
  const v=parseFloat(String(val).replace(',','.'));
  if(isNaN(v)) return null;
  return exam.ev(v,sex);
}
function overallCt(entries,sex) {
  const rs=Object.keys(entries).map(id=>{const ex=EX.find(e=>e.id===id);return ex?evExam(ex,entries[id],sex):null;}).filter(Boolean);
  if(rs.some(r=>r.c==='x')) return 'x';
  if(rs.some(r=>r.c==='a')) return 'a';
  if(rs.length>0) return 'ok';
  return null;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() { document.getElementById('root').innerHTML = buildApp(); }

function buildApp() {
  if(st.screen==='patients') return buildPatientList();
  if(st.screen==='form') return buildForm();
  if(st.screen==='patientView') return buildPatientView();
  return '';
}

function buildPatientList() {
  const pacs = st.patients;
  return `<div class="hdr">
    <div class="hdr-row">
      <div class="hdr-left"><h1>Pacientes</h1><p>EF Hospitalar · SUS</p></div>
      <button class="icon-btn primary" onclick="openForm(null)"><i class="ti ti-plus"></i> Nova</button>
    </div>
  </div>
  <div class="content" style="padding-bottom:20px">
    ${!pacs.length
      ? `<div class="empty"><i class="ti ti-users"></i><p>Nenhuma paciente cadastrada.</p>
         <p style="margin-top:12px"><button class="icon-btn primary" onclick="openForm(null)" style="margin:0 auto"><i class="ti ti-plus"></i> Cadastrar primeira paciente</button></p></div>`
      : pacs.map(p => {
          const age = calcAge(p.dataNasc);
          const numEx = Object.keys(p.entries||{}).length;
          const ct = numEx ? overallCt(p.entries, p.sexo||'F') : null;
          const exTag = numEx ? `<span class="tag ex ${ct?'ex-'+ct:''}">${{x:'🔴',a:'🟡',ok:'🟢'}[ct]||''} ${numEx} exame${numEx>1?'s':''}</span>` : '';
          return `<div class="pac-card" onclick="openPac('${p.id}')">
            <div class="pac-av">${esc(initials(p.nome))}</div>
            <div style="flex:1;min-width:0">
              <div class="pac-nome">${esc(p.nome)}</div>
              <div class="pac-info">${age!==null?age+' anos':fmtDate(p.dataNasc)}${p.diagnostico?' · '+p.diagnostico.split('\n')[0].substring(0,40):''}</div>
              <div class="pac-tags">${p.gestacao?`<span class="tag gest">🤰 ${esc(p.gestacao)}</span>`:''}${exTag}</div>
            </div>
            <i class="ti ti-chevron-right" style="color:var(--t3);font-size:18px"></i>
          </div>`;
        }).join('')}
  </div>`;
}

function buildForm() {
  const f = st.form; const isEdit = !!(f&&f.id);
  return `<div class="hdr">
    <div class="hdr-row">
      <button class="back-btn" onclick="cancelForm()"><i class="ti ti-arrow-left"></i></button>
      <div class="hdr-left"><h1>${isEdit?'Editar paciente':'Nova paciente'}</h1></div>
    </div>
  </div>
  <div class="content" style="padding-bottom:20px">
    <div class="form-sec">
      <h2>Identificação</h2>
      <div class="field"><label>Nome completo *</label><input type="text" id="f_nome" value="${esc(f?.nome||'')}" placeholder="Nome da paciente" oninput="fv('nome',this.value)" autocomplete="off" autocorrect="off" /></div>
      <div class="field"><label>Data de nascimento</label><input type="date" id="f_dob" value="${esc(f?.dataNasc||'')}" oninput="fv('dataNasc',this.value)" /></div>
      <div class="field"><label>Sexo biológico</label>
        <div class="sex-wrap">
          <button class="sex-btn ${f?.sexo!=='M'?'on':''}" onclick="fv('sexo','F')">Feminino</button>
          <button class="sex-btn ${f?.sexo==='M'?'on':''}" onclick="fv('sexo','M')">Masculino</button>
        </div>
      </div>
    </div>
    <div class="form-sec">
      <h2>Dados clínicos</h2>
      <div class="field"><label>Semanas de gestação</label><input type="text" id="f_gest" value="${esc(f?.gestacao||'')}" placeholder="Ex.: 28 semanas (opcional)" oninput="fv('gestacao',this.value)" autocomplete="off" /><div class="field-hint">Deixe em branco se não gestante.</div></div>
      <div class="field"><label>Diagnóstico prévio</label><textarea id="f_diag" placeholder="Ex.: ICC, DM2, HAS..." oninput="fv('diagnostico',this.value)">${esc(f?.diagnostico||'')}</textarea></div>
    </div>
    <button class="save-btn" onclick="savePac()"><i class="ti ti-check"></i>${isEdit?'Salvar alterações':'Cadastrar paciente'}</button>
    ${isEdit?`<button class="del-btn" onclick="deletePac('${f.id}')"><i class="ti ti-trash"></i>Excluir paciente</button>`:''}
  </div>`;
}

function buildPatientView() {
  const p = st.currentPac; if(!p) return '';
  const age = calcAge(p.dataNasc);
  const sub = [age!==null?age+' anos':'', p.gestacao?'🤰 '+p.gestacao:''].filter(Boolean).join(' · ');
  const nEx = Object.keys(p.entries||{}).length;
  return `<div class="hdr">
    <div class="hdr-row">
      <button class="back-btn" onclick="closePac()"><i class="ti ti-arrow-left"></i></button>
      <div class="hdr-left"><h1>${esc(p.nome)}</h1>${sub?`<p>${esc(sub)}</p>`:''}</div>
      <button class="icon-btn" onclick="openForm('${p.id}')" style="padding:7px 11px"><i class="ti ti-edit"></i></button>
    </div>
    ${(st.tab==='ref'&&st.refSc==='cats')||st.tab==='eval'?`<div class="search-wrap"><i class="ti ti-search si"></i>
      <input type="text" placeholder="${st.tab==='eval'?'Buscar exame para adicionar...':'Buscar exame ou categoria...'}" value="${esc(st.q)}" oninput="setQ(this.value)" />
      ${st.q?`<button class="sc" onclick="setQ('')"><i class="ti ti-x"></i></button>`:''}
    </div>`:''}
  </div>
  <div class="content">${buildPacContent(p)}</div>
  <div class="nav">
    ${[{id:'ref',ic:'ti-book-2',lbl:'Referência'},{id:'eval',ic:'ti-pencil-plus',lbl:'Avaliar'+(nEx?' ('+nEx+')':'')},{id:'conduta',ic:'ti-clipboard-check',lbl:'Conduta'}]
      .map(t=>`<button class="nav-btn ${st.tab===t.id?'on':''}" onclick="setTab('${t.id}')"><i class="ti ${t.ic}"></i>${esc(t.lbl)}</button>`).join('')}
  </div>`;
}

function buildPacContent(p) {
  if(st.tab==='ref') {
    if(st.q.trim()) return buildRefSearch(p);
    if(st.refSc==='cats') return buildRefCats();
    if(st.refSc==='catExams') return buildRefCatExams();
    if(st.refSc==='examDetail') return buildExamDetail(p);
  }
  if(st.tab==='eval') return buildEvalTab(p);
  if(st.tab==='conduta') return buildCondutaTab(p);
  return '';
}

function buildRefSearch(p) {
  const q=st.q.toLowerCase();
  const res=EX.filter(e=>e.name.toLowerCase().includes(q)||e.abbr.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q));
  if(!res.length) return `<div class="empty"><i class="ti ti-search"></i>Nenhum resultado para "${esc(st.q)}"</div>`;
  return `<div class="sec-hdr">${res.length} resultado(s)</div>`+res.map(e=>examListItem(e)).join('');
}
function buildRefCats() {
  return '<div class="cat-grid">'+CATS_WITH_EX.map(c=>`<div class="cat-card" onclick="openCat('${c.id}')"><div class="cat-icon" style="background:${c.bg}">${c.icon}</div><div class="cat-name">${esc(c.name)}</div><div class="cat-cnt">${c.exams.length} exames</div></div>`).join('')+'</div>';
}
function buildRefCatExams() {
  return EX.filter(e=>e.cat===st.refCat).map(e=>examListItem(e)).join('');
}
function examListItem(e) {
  const cl={x:'bx',a:'ba',ok:'bok',m:'bm'}[e.ct]||'bm';
  const lbl={x:'Contraindicado',a:'Com restrição',ok:'Indicado',m:'Verificar'}[e.ct]||'—';
  return `<div class="eli" onclick="openExam('${e.id}')"><div><div class="eli-name">${esc(e.name)}</div><div class="eli-sub">${esc(e.sub)}</div></div><span class="badge ${cl}">${lbl}</span></div>`;
}
function buildExamDetail(p) {
  const e=st.refExam; if(!e) return '';
  const sex=p.sexo||'F'; const isAdded=(p.entries||{})[e.id]!==undefined;
  const cc={x:'x',a:'a',ok:'ok',m:'m'};
  return `<div class="det-sec"><div class="det-lbl">Descrição fisiológica</div><div class="det-val">${esc(e.desc)}</div></div>
  <div class="det-sec"><div class="det-lbl">Valores de referência</div><div class="ref-box">${esc(refStr(e,sex))}</div></div>
  <div class="det-sec"><div class="det-lbl">Alterações clínicas</div><div class="det-val">${esc(e.altClin)}</div></div>
  <div class="det-sec"><div class="det-lbl">Avaliar em conjunto com</div><div class="chips">${e.related.map(r=>`<span class="chip">${esc(r)}</span>`).join('')}</div></div>
  <div class="det-sec"><div class="det-lbl">Relação com exercício físico</div><div class="det-val">${esc(e.exRel)}</div></div>
  <div class="det-sec"><div class="det-lbl">Conduta clínica</div><div class="cond-box ${cc[e.ct]||'m'}">${esc(e.condText)}</div></div>
  <button class="add-to-eval ${isAdded?'added':''}" ${isAdded?'':'onclick="addAndGoEval(\''+e.id+'\')"'}>
    <i class="ti ${isAdded?'ti-check':'ti-circle-plus'}"></i>${isAdded?'Já adicionado à avaliação':'Adicionar à avaliação'}
  </button>`;
}

function buildEvalTab(p) {
  const sex=p.sexo||'F'; const entries=p.entries||{};
  const added=EX.filter(e=>entries[e.id]!==undefined);
  let html='';
  if(p.diagnostico||p.gestacao) {
    html+=`<div class="pac-info-bar"><strong>${esc(p.nome)}</strong>${calcAge(p.dataNasc)?' · '+calcAge(p.dataNasc)+' anos':''}${p.gestacao?' · 🤰 '+p.gestacao:''}<br><span style="color:var(--t3)">${esc((p.diagnostico||'').split('\n')[0])}</span></div>`;
  }
  if(st.q.trim()) {
    const q=st.q.toLowerCase();
    const res=EX.filter(e=>e.name.toLowerCase().includes(q)||e.abbr.toLowerCase().includes(q));
    if(!res.length){html+=`<div class="empty" style="padding:28px 0"><i class="ti ti-search"></i>Nenhum resultado</div>`;}
    else {
      html+=`<div class="sec-hdr">Toque em + para adicionar</div>`;
      res.forEach(e=>{const isAdded=entries[e.id]!==undefined;html+=`<div class="search-result-row"><div><div style="font-size:13px;font-weight:600;color:var(--t1)">${esc(e.name)}</div><div style="font-size:11px;color:var(--t3)">${esc(CATS_META.find(c=>c.id===e.cat)?.name||'')} · ${esc(e.unit)}</div></div><button class="add-btn ${isAdded?'chk':''}" ${isAdded?'disabled':'onclick="addExam(\''+e.id+'\')"'}><i class="ti ${isAdded?'ti-check':'ti-plus'}"></i></button></div>`;});
    }
    if(added.length) html+=`<div style="margin-top:12px"><div class="sec-hdr">Inseridos (${added.length})</div>${added.map(e=>buildExCard(e,entries,sex)).join('')}</div>`;
    return html;
  }
  if(added.length) {
    html+=`<div class="eval-added-section"><div class="sec-hdr">Exames inseridos (${added.length}) <a onclick="setTab('conduta')">Ver conduta →</a></div>${added.map(e=>buildExCard(e,entries,sex)).join('')}</div>`;
  }
  html+=`<div class="sec-hdr" style="margin-top:${added.length?'4px':'0'}">Adicionar exames</div>`;
  CATS_WITH_EX.forEach(c=>{
    const isOpen=st.accOpen===c.id;
    const catAdded=c.exams.filter(e=>entries[e.id]!==undefined).length;
    html+=`<div class="acc-cat"><div class="acc-hdr" onclick="toggleAcc('${c.id}')">
      <div class="acc-title">${c.icon} ${esc(c.name)} <span class="acc-cnt">${c.exams.length} exames${catAdded?' · '+catAdded+' ✓':''}</span></div>
      <i class="ti ti-chevron-down acc-chev ${isOpen?'open':''}"></i></div>
      ${isOpen?`<div class="acc-body">${c.exams.map(e=>{const isAdded=entries[e.id]!==undefined;return`<div class="aer"><div><div class="aer-name">${esc(e.name)}</div><div class="aer-unit">${esc(e.unit)}</div></div><button class="add-btn ${isAdded?'chk':''}" ${isAdded?'disabled':'onclick="addExam(\''+e.id+'\')"'}><i class="ti ${isAdded?'ti-check':'ti-plus'}"></i></button></div>`;}).join('')}</div>`:''}</div>`;
  });
  return html;
}

function buildExCard(e,entries,sex) {
  const val=entries[e.id]||''; const res=val!==''?evExam(e,val,sex):null; const c=res?res.c:'';
  let inputHtml;
  if(e.binary) {
    inputHtml=`<div class="ex-inp-row"><div class="sex-wrap" style="gap:6px">
      <button class="sex-btn ${!val||val==='0'?'on':''}" onclick="setVal('${e.id}','0')">Normal</button>
      <button class="sex-btn ${val==='1'?'on':''}" style="${val==='1'?'border-color:var(--td);background:var(--bgd);color:var(--td)':''}" onclick="setVal('${e.id}','1')">Elevada</button>
    </div></div>`;
  } else {
    inputHtml=`<div class="ex-inp-row"><input type="number" step="${e.step||'any'}" inputmode="decimal" placeholder="—" value="${esc(val)}" oninput="setVal('${e.id}',this.value)" /><span class="ex-unit">${esc(e.unit)}</span></div>`;
  }
  return `<div class="ex-card"><div class="ex-card-hd"><div><div class="ex-name">${esc(e.name)}</div><div class="ex-sub">${esc(CATS_META.find(cm=>cm.id===e.cat)?.name||e.cat)}</div></div>
    <button class="rm-btn" onclick="removeExam('${e.id}')"><i class="ti ti-x"></i></button></div>
    ${inputHtml}<div class="ex-ref">VR: ${esc(refStr(e,sex))}</div>
    ${res?`<div class="cstrip ${c}"><div class="cst"><i class="ti ${c==='x'?'ti-circle-x':c==='a'?'ti-alert-triangle':'ti-circle-check'}"></i>${esc(res.st)}</div><div class="ccd">${esc(res.cd)}</div></div>${res.tip?`<div class="ctip">${esc(res.tip)}</div>`:''}`:''}
  </div>`;
}

function buildCondutaTab(p) {
  const entries=p.entries||{}; const sex=p.sexo||'F';
  const added=EX.filter(e=>entries[e.id]!==undefined);
  if(!added.length) return `<div class="empty"><i class="ti ti-clipboard"></i><p>Nenhum exame inserido ainda.</p><p>Vá para a aba Avaliar.</p></div>`;
  const ct=overallCt(entries,sex)||'ok';
  const hi={x:{cls:'x',ic:'ti-circle-x',lbl:'Conduta geral',main:'Contraindicado'},a:{cls:'a',ic:'ti-alert-triangle',lbl:'Conduta geral',main:'Com restrição'},ok:{cls:'ok',ic:'ti-circle-check',lbl:'Conduta geral',main:'Indicado'}}[ct];
  let html=`<div class="pac-info-bar"><strong>${esc(p.nome)}</strong>${calcAge(p.dataNasc)?' · '+calcAge(p.dataNasc)+' anos':''}${p.gestacao?' · 🤰 '+p.gestacao:''}</div>`;
  html+=`<div class="sum-hero ${hi.cls}"><div class="sh-lbl"><i class="ti ${hi.ic}" style="margin-right:4px"></i>${hi.lbl}</div><div class="sh-val">${hi.main}</div></div>`;
  const groups={x:[],a:[],ok:[]};
  added.forEach(e=>{const val=entries[e.id];const res=val!==''?evExam(e,val,sex):null;const g=res?res.c:'ok';(groups[g]||groups['ok']).push({e,val,res});});
  ['x','a','ok'].forEach(g=>{groups[g].forEach(({e,val,res})=>{
    const vd=e.binary?(val==='1'?'Elevada':'Normal'):`${val} ${e.unit}`;
    html+=`<div class="sum-row"><div class="sdot ${g}"></div><div style="flex:1"><div class="sr-nm">${esc(e.name)}</div><div class="sr-vl">${esc(vd)} · VR: ${esc(refStr(e,sex))}</div>${res?`<div class="sr-cd ${g}">${esc(res.cd)}</div>`:''}${res&&res.tip?`<div class="sr-tip">${esc(res.tip)}</div>`:''}</div></div>`;
  });});
  html+=`<div class="disc"><i class="ti ti-info-circle" style="margin-right:4px"></i>Ferramenta de apoio à decisão clínica. O julgamento individualizado do profissional é insubstituível.</div>`;
  return html;
}

// ─── Handlers ─────────────────────────────────────────────────────────────────
function openForm(id) {
  if(id===null){st.form={id:null,nome:'',dataNasc:'',sexo:'F',gestacao:'',diagnostico:'',entries:{}};}
  else {const p=st.patients.find(x=>x.id===id)||st.currentPac; st.form=p?{...p}:null;}
  st.screen='form'; render();
}
function cancelForm(){st.screen=st.currentPac?'patientView':'patients';st.form=null;render();}
function fv(field,val){if(!st.form)return;st.form[field]=val;if(field==='sexo')render();}
function savePac(){
  const f=st.form; if(!f||!f.nome.trim()){alert('Informe o nome da paciente.');return;}
  if(f.id){
    const idx=st.patients.findIndex(p=>p.id===f.id);
    const updated={...st.patients[idx],...f,atualizadoEm:new Date().toISOString()};
    if(idx>=0) st.patients[idx]=updated;
    if(st.currentPac&&st.currentPac.id===f.id) st.currentPac=updated;
    savePacToDb(updated);
  } else {
    const np={...f,id:uid(),entries:{},criadoEm:new Date().toISOString(),atualizadoEm:new Date().toISOString()};
    st.patients.push(np); st.currentPac=np;
    savePacToDb(np);
  }
  st.form=null; st.screen='patientView'; st.tab='eval'; st.refSc='cats'; render();
}
function deletePac(id){
  if(!confirm('Excluir esta paciente? Esta ação não pode ser desfeita.')) return;
  deletePacFromDb(id);
  st.patients=st.patients.filter(p=>p.id!==id);
  st.currentPac=null; st.form=null; st.screen='patients'; render();
}
function openPac(id){
  const p=st.patients.find(x=>x.id===id); if(!p) return;
  st.currentPac=p; st.screen='patientView'; st.tab='eval'; st.refSc='cats'; st.q=''; st.accOpen=null; render();
}
function closePac(){st.screen='patients';st.currentPac=null;st.q='';render();}
function setTab(t){st.tab=t;if(t!=='ref')st.q='';if(t==='eval')st.accOpen=null;render();}
function setQ(v){st.q=v;render();}
function openCat(id){st.refCat=id;st.refSc='catExams';render();}
function openExam(id){const ex=EX.find(e=>e.id===id);if(ex){st.refExam=ex;st.refSc='examDetail';render();}}
function goBack(){if(st.refSc==='examDetail')st.refSc='catExams';else if(st.refSc==='catExams'){st.refSc='cats';st.refCat=null;}render();}
function toggleAcc(id){st.accOpen=st.accOpen===id?null:id;render();}
function addExam(id){
  if(!st.currentPac)return;
  if(!st.currentPac.entries)st.currentPac.entries={};
  if(st.currentPac.entries[id]===undefined){st.currentPac.entries[id]='';syncAndSave();st.q='';render();}
}
function removeExam(id){
  if(!st.currentPac||!st.currentPac.entries)return;
  delete st.currentPac.entries[id];syncAndSave();render();
}
function setVal(id,v){
  if(!st.currentPac)return;
  if(!st.currentPac.entries)st.currentPac.entries={};
  st.currentPac.entries[id]=v;syncAndSave();render();
}
function addAndGoEval(id){addExam(id);st.tab='eval';render();}
function syncAndSave(){
  if(!st.currentPac)return;
  const idx=st.patients.findIndex(p=>p.id===st.currentPac.id);
  if(idx>=0)st.patients[idx]=st.currentPac;
  savePacToDb(st.currentPac);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:', e));
}
initFirestore();
</script>
</body>
</html>
